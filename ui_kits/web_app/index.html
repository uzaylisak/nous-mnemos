<title>Nous Mnemos — UI Kit</title>
<link rel="stylesheet" href="./colors_and_type.css" />
<!-- highlight.js theme — single light theme, Frutiger Aero only -->
<link id="hljs-light" rel="stylesheet" href="https://unpkg.com/highlight.js@11.9.0/styles/github.css" />
<style>
  body { margin: 0; }
  @keyframes float1 { 0%, 100% { transform: translateY(0) } 50% { transform: translateY(-18px) } }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 0.4 } 50% { opacity: 1 } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
  select.input option { color: var(--text-primary); background: var(--glass-bg-solid, #fff); }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff, #0288D1);
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: 0 2px 6px rgba(2,136,209,0.4);
    cursor: pointer;
  }

  /* ------- Markdown rendering ------- */
  .md { font-family: var(--font-body); line-height: 1.65; color: inherit; }
  .md p { margin: 0 0 10px; color: inherit; }
  .md p:last-child { margin-bottom: 0; }
  .md ul, .md ol { margin: 6px 0 12px; padding-left: 22px; }
  .md li { margin: 2px 0; }
  .md h1, .md h2, .md h3, .md h4 { margin: 14px 0 6px; line-height: 1.3; color: inherit; }
  .md h1 { font-size: 1.45em; font-weight: 800; }
  .md h2 { font-size: 1.25em; font-weight: 800; }
  .md h3 { font-size: 1.10em; font-weight: 700; }
  .md h4 { font-size: 1.0em;  font-weight: 700; }
  .md a  { color: var(--sky-600); text-decoration: underline; }
  .md blockquote { margin: 8px 0; padding: 6px 14px; border-left: 3px solid var(--sky-500); background: rgba(255,255,255,0.25); border-radius: 0 8px 8px 0; color: var(--text-secondary); }
  .md code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.92em; padding: 2px 6px; background: rgba(30,90,160,0.10); border-radius: 4px; }
  .md pre { margin: 10px 0; padding: 12px 14px; background: rgba(11,40,71,0.06); border: 1px solid rgba(30,90,160,0.12); border-radius: 10px; overflow-x: auto; font-size: 13px; line-height: 1.5; }
  .md pre code { padding: 0; background: none; font-size: 13px; }
  .md table { border-collapse: collapse; margin: 10px 0; font-size: 13px; }
  .md th, .md td { padding: 6px 10px; border: 1px solid rgba(30,90,160,0.18); }
  .md th { background: rgba(30,90,160,0.08); font-weight: 700; }
  .md hr { border: none; border-top: 1px solid rgba(30,90,160,0.15); margin: 14px 0; }
  .md--invert a { color: #fff; text-decoration-color: rgba(255,255,255,0.7); }
  .md--invert code { background: rgba(255,255,255,0.18); color: #fff; }
  .md--invert pre  { background: rgba(0,0,0,0.18); border-color: rgba(255,255,255,0.18); }
  .md--invert blockquote { background: rgba(255,255,255,0.10); border-left-color: rgba(255,255,255,0.7); color: rgba(255,255,255,0.92); }

  /* Mobile responsive */
  @media (max-width: 720px) {
    .nav-links-row { display: none !important; }
    .resp-grid-2 { grid-template-columns: 1fr !important; }
    .resp-grid-3 { grid-template-columns: 1fr !important; }
    .resp-grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
    .resp-flex-wrap { flex-wrap: wrap !important; }
    .resp-hide { display: none !important; }
    h1 { font-size: 36px !important; }
    h2 { font-size: 28px !important; }
  }
  @media (max-width: 1100px) {
    .resp-grid-3 { grid-template-columns: repeat(2, 1fr) !important; }
  }
</style>
